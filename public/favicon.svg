<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="ClockIn favicon">
  <title>ClockIn</title>

  <!-- Gradient Definition -->
  <defs>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Circular stroke with gap -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="url(#blueGradient)" stroke-width="12"
          stroke-linecap="round" stroke-dasharray="252 42" stroke-dashoffset="10"/>
  
  <!-- Check mark -->
  <path d="M35 52 L48 65 L73 40" fill="none" stroke="url(#blueGradient)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
</svg>